services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama

  webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_BASE_URL=http://localhost:11434
    depends_on:
      - ollama

  # --- OpenHands (არასავალდებულო) ---
  # ჩართე ეს სერვისი, თუ გინდა backend/agents/openhands_agent.py-მ რეალურად
  # იმუშაოს (delegate_openhands action orchestrator-ში). დარწმუნდი, რომ:
  #   1. .env-ში OPENHANDS_ENABLED=true და OPENHANDS_BASE_URL=http://127.0.0.1:3000
  #      (ან docker ქსელის სახელი, თუ backend-იც კონტეინერშია)
  #   2. LLM_API_KEY შევსებულია შენი რეალური provider-ის key-ით
  #      (openhands-ს თავისი მოდელი სჭირდება — შეიძლება იყოს Ollama-ც,
  #      მაგრამ ცალკე უნდა დააკონფიგურირო LiteLLM routing-ით)
  #   3. ⚠️ ეს სერვისი Docker socket-ს იყენებს sandbox კონტეინერების
  #      გასაშვებად — production-ში წაკითხე OpenHands-ის security guide-ი
  #      (https://docs.openhands.dev) Docker-in-Docker იზოლაციაზე.
