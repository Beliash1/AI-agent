  #   container_name: openhands
  #   ports:
  #     - "3001:3000"   # 3000 open-webui-სთვისაა დაკავებული ზემოთ
  #   environment:
  #     - LLM_API_KEY=${LLM_API_KEY}
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - ./openhands-workspace:/workspace
